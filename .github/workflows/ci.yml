name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check starlab tests

      - name: Ruff format check
        run: ruff format --check starlab tests

      - name: Mypy
        run: mypy starlab tests

  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Pytest smoke with JUnit
        run: pytest -q -m smoke --junitxml=pytest-smoke-junit.xml

      - name: Upload smoke JUnit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-smoke-junit-xml
          path: pytest-smoke-junit.xml
          if-no-files-found: error

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Pytest with coverage and JUnit
        run: |
          pytest -q \
            --cov=starlab \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --junitxml=pytest-junit.xml

      - name: Coverage TOTAL line (branch-aware) for step summary
        if: always()
        shell: bash
        run: |
          echo "### Tests job — coverage TOTAL (line + branch)" >> "$GITHUB_STEP_SUMMARY"
          python -m coverage report --precision=2 | grep '^TOTAL' >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload pytest JUnit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-junit-xml
          path: pytest-junit.xml
          if-no-files-found: error

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      # pip-audit narrow ignore — CVE-2026-3219, package: pip (CI runner / toolchain `pip` after
      # `pip install --upgrade pip`). Reason: no PyPI release with an audit-clean fix was available
      # at time of mitigation (PyPI 26.0.1 was latest; checked 2026-04-24). Removal: delete this
      # --ignore-vuln once a fixed pip is published and `pip install pip==<version>` is audit-clean.
      - name: pip-audit
        run: |
          python -m pip_audit --ignore-vuln CVE-2026-3219

      - name: CycloneDX SBOM
        run: python -m cyclonedx_py environment -o sbom.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-cyclonedx-json
          path: sbom.json
          if-no-files-found: error

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fieldtest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Field test (fixture-only M31 explorer)
        run: make fieldtest

      - name: Verify explorer outputs
        shell: bash
        run: |
          test -f out/fieldtest/replay_explorer_surface.json
          test -f out/fieldtest/replay_explorer_surface_report.json

      - name: Upload field-test output directory
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fieldtest-output
          path: out/fieldtest/
          if-no-files-found: error

  flagship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Emit public flagship proof pack (M39)
        run: make flagship

      - name: Verify flagship outputs
        shell: bash
        run: |
          test -f out/flagship/public_flagship_proof_pack.json
          test -f out/flagship/public_flagship_proof_pack_report.json
          test -f out/flagship/hashes.json
          test -f out/flagship/baseline/baseline_evidence_pack.json
          test -f out/flagship/learned/learned_agent_evaluation.json
          test -f out/flagship/explorer/replay_explorer_surface.json
          python -c "import json,sys; h=json.load(open('out/flagship/hashes.json')); assert 'public_flagship_proof_pack.json' in h and len(h)==8; sys.exit(0)"

      - name: Upload flagship proof pack directory
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: flagship-proof-pack
          path: out/flagship/
          if-no-files-found: error

  governance:
    needs: [quality, smoke, tests, security, fieldtest, flagship]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Governance aggregate (required merge gate)
        shell: bash
        run: |
          {
            echo "## STARLAB CI — all tiers passed"
            echo ""
            echo "| Tier | Status |"
            echo "|------|--------|"
            echo "| quality | ok |"
            echo "| smoke | ok |"
            echo "| tests + coverage | ok |"
            echo "| security | ok |"
            echo "| fieldtest (fixtures) | ok |"
            echo "| flagship (M39 proof pack) | ok |"
            echo ""
            echo "Workflow **CI**; final job **governance**. Green means merge-safe for this checkpoint, not feature-complete."
          } >> "$GITHUB_STEP_SUMMARY"
