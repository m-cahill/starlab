# M57 — optional, non-required, manual live SC2 controlled runner (self-hosted).
# Not part of default PR merge checks. See docs/runtime/live_sc2_in_ci_charter_controlled_runner_v1.md

name: Live SC2 controlled runner (M57)

on:
  workflow_dispatch:
    inputs:
      m43_run_dir:
        description: "Path to M43 hierarchical training run directory (repo-relative)"
        required: true
        type: string
      weights_path:
        description: "Path to joblib weights (repo-relative)"
        required: true
        type: string
      match_config:
        description: "Path to M02 match config JSON (burnysc2 for live)"
        required: true
        type: string
      output_dir:
        description: "Output directory for M44 + receipts (repo-relative)"
        required: true
        type: string

concurrency:
  group: live-sc2-m57-${{ github.repository }}
  cancel-in-progress: true

jobs:
  controlled-runner:
    runs-on: [self-hosted, starlab-sc2]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Run M57 controlled runner (local_live_sc2)
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python -m starlab.sc2.run_live_sc2_in_ci_controlled_runner \
            --m43-run "${{ github.event.inputs.m43_run_dir }}" \
            --weights "${{ github.event.inputs.weights_path }}" \
            --match-config "${{ github.event.inputs.match_config }}" \
            --output-dir "${{ github.event.inputs.output_dir }}" \
            --runtime-mode local_live_sc2 \
            --requested-runner-posture github_workflow_dispatch \
            --workflow-trigger workflow_dispatch \
            --runner-labels "${{ runner.os }},self-hosted,starlab-sc2"

      - name: Upload M57 receipts and M44 outputs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: m57-live-sc2-controlled-runner-${{ github.run_id }}
          path: |
            ${{ github.event.inputs.output_dir }}/live_sc2_in_ci_controlled_runner_receipt.json
            ${{ github.event.inputs.output_dir }}/live_sc2_in_ci_controlled_runner_receipt_report.json
            ${{ github.event.inputs.output_dir }}/local_live_play_validation_run.json
            ${{ github.event.inputs.output_dir }}/replay_binding.json
          if-no-files-found: warn
